name: Build, Test, and Run Main

on:
  pull_request:

jobs:
  build-test-run:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Generate 1k test data (rules=1000, packets=10000)
        run: uv run gen_testdata.py --rules 1000 --packets 10000 --seed 42 --out-dir Data

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Smoke check CLI
        run: ./main --help || true

      - name: Run main and generate results
        run: ./main -r Data/test_1000 -p Data/test_1000_trace

      - name: Upload results.csv
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: main-results-${{ matrix.arch }}
          path: results.csv
